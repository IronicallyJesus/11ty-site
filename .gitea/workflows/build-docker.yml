name: Build and Push Docker Image
run-name: Build and Push Docker Image for ${{ gitea.ref_name }} by @${{ gitea.actor }}

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    uses: twk95/actions/.gitea/workflows/build-image.yml@main
    secrets: inherit

  publish-docker-hub:
    needs: build
    uses: ./.gitea/workflows/dockerhub-publish.yml
    with:
      image_name: ironicallyjesus/opnsense-wol-dash
    secrets:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

  deploy:
    needs: publish-docker-hub
    uses: twk95/actions/.gitea/workflows/dockge-deploy.yml@main
    with:
      service_name: 11ty-page
      stacks_dir: /opt/stacks/11ty-page
    secrets: inherit
