name: Build and Push Docker Image
run-name: Build and Push Docker Image for ${{ gitea.ref_name }} by @${{ gitea.actor }}

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    uses: ./.gitea/workflows/build-image.yml
    secrets: inherit
  deploy:
    needs: build
    uses: ./.gitea/workflows/dockge-deploy.yml
    with:
      service_name: 11ty-page
    secrets: inherit
