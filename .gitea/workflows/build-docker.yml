name: Build and Push Docker Image
run-name: Build and Push Docker Image for ${{ gitea.ref_name }} by @${{ gitea.actor }}

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    uses: twk95/actions/.gitea/workflows/build-image.yml@bcb802d4b14904e6164ccaa7dca0c841f1566cd6
    secrets: inherit
  deploy:
    needs: build
    uses: twk95/actions/.gitea/workflows/dockge-deploy.yml@bcb802d4b14904e6164ccaa7dca0c841f1566cd6
    with:
      service_name: 11ty-page
      stacks_dir: /opt/stacks/11ty-page
    secrets: inherit
